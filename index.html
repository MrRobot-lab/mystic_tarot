<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mystic Tarot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <style>
        :root {
            --bg-color-start: #1a0b2e;
            --bg-color-end: #000000;
            --accent-gold: #ffd700;
            --accent-purple: #4b0082;
            --text-main: #ffffff;
            --text-secondary: #cccccc;
            --card-width: 200px;
            --card-height: 320px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background: radial-gradient(circle at center, var(--bg-color-start), var(--bg-color-end));
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle 4s infinite ease-in-out;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.5);
            }
        }

        .app-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1,
        h2,
        h3 {
            font-family: 'Cinzel', serif;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            text-align: center;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Home */
        .deck-container {
            margin-top: 20px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-back {
            width: var(--card-width);
            height: var(--card-height);
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0b2e 100%);
            border: 2px solid var(--accent-gold);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(75, 0, 130, 0.5), inset 0 0 15px rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            animation: breath 3s infinite ease-in-out;
        }

        .card-back::after {
            content: '';
            position: absolute;
            width: 80%;
            height: 90%;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
        }

        .card-back i {
            font-size: 3rem;
            color: var(--accent-gold);
            opacity: 0.8;
        }

        @keyframes breath {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(75, 0, 130, 0.5);
            }

            50% {
                transform: scale(1.02);
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            }
        }

        .card-shaking {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        /* Spread Selector */
        .spread-selector {
            margin-top: 30px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .spread-option {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .spread-option.selected {
            background: rgba(255, 215, 0, 0.1);
            border-color: var(--accent-gold);
        }

        .spread-option.locked {
            opacity: 0.6;
        }

        .spread-option i {
            margin-right: 15px;
            font-size: 1.2rem;
            color: var(--accent-gold);
            width: 25px;
            text-align: center;
        }

        /* Status Badges */
        .badge {
            position: absolute;
            right: 10px;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid;
        }

        .badge-ad {
            color: #aaaaff;
            border-color: #aaaaff;
        }

        .badge-premium {
            color: #ffaa00;
            border-color: #ffaa00;
        }

        .badge-locked {
            color: #ff4444;
            border-color: #ff4444;
        }

        .spread-info h4 {
            margin: 0;
            color: var(--text-main);
            font-family: 'Cinzel', serif;
        }

        .spread-info p {
            margin: 5px 0 0;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Result */
        .cards-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 40px;
            margin-bottom: 20px;
        }

        .spread-position-label {
            text-align: center;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--accent-gold);
            margin-bottom: 10px;
            opacity: 0.8;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 5px;
            width: 80%;
        }

        .result-card-container {
            perspective: 1000px;
            width: var(--card-width);
            height: var(--card-height);
        }

        .result-card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s;
            animation: cardAppear 1s ease-out forwards;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            border: 2px solid var(--accent-gold);
            overflow: hidden;
        }

        .card-face.front {
            background: #1a0b2e;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
        }

        .card-face.back {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0b2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-face.back i {
            font-size: 3rem;
            color: var(--accent-gold);
        }

        .result-card.flipped {
            transform: rotateY(180deg);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.8);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card-info {
            text-align: center;
            width: 100%;
            padding: 0 10px;
            margin-bottom: 30px;
        }

        .card-short {
            margin-bottom: 20px;
            font-style: italic;
            color: var(--text-secondary);
        }

        .btn {
            background: linear-gradient(45deg, #4b0082, #2d1b4e);
            border: 1px solid var(--accent-gold);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 25px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            margin: 5px 0;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-share {
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.9rem;
        }

        /* Dev Button */
        .dev-btn {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            padding: 5px 10px;
            font-size: 0.7rem;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
        }

        .premium-badge {
            color: var(--accent-gold);
            border-color: var(--accent-gold);
            opacity: 1;
        }

        .ad-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--accent-gold);
        }

        .ad-loader.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 215, 0, 0.3);
            border-top: 4px solid var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="particles" id="particles"></div>
    <button id="dev-btn" class="dev-btn" onclick="togglePremium()">DEV: Free User</button>

    <div class="app-container">
        <!-- Home Screen -->
        <div id="home-screen" class="screen">
            <h1>Карта твоего дня</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 20px;">
                Сосредоточься на вопросе
            </p>

            <div class="deck-container" id="deck" onclick="tryDraw()">
                <div class="card-back">
                    <i class="fa-solid fa-eye"></i>
                </div>
            </div>

            <!-- Spread Selector (Hidden for Single Entry Flow) -->
            <div class="spread-selector" style="display: none;">
                <div class="spread-option selected" id="opt-one" onclick="selectSpread('one')">
                    <i class="fa-solid fa-note-sticky"></i>
                    <div class="spread-info">
                        <h4>Карта дня</h4>
                        <p>Совет на сегодня</p>
                    </div>
                </div>

                <div class="spread-option" id="opt-three" onclick="selectSpread('three')">
                    <i class="fa-solid fa-layer-group"></i>
                    <div class="spread-info">
                        <h4>Три карты</h4>
                        <p>Причина • Ситуация • Исход</p>
                    </div>
                    <span class="badge badge-ad" id="badge-three">AD</span>
                </div>

                <div class="spread-option locked" id="opt-cross" onclick="selectSpread('cross')">
                    <i class="fa-solid fa-cross"></i>
                    <div class="spread-info">
                        <h4>Кельтский крест</h4>
                        <p>Полный анализ (10 карт)</p>
                    </div>
                    <span class="badge badge-locked" id="badge-cross"><i class="fa-solid fa-lock"></i></span>
                </div>
            </div>

            <p style="margin: 20px 0; font-size: 0.9rem; opacity: 0.7;">
                Нажми на колоду для начала
            </p>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <h2 id="result-title" style="margin-bottom: 20px;">Результат</h2>

            <div id="cards-container" class="cards-layout">
                <!-- Cards will be injected here -->
            </div>

            <button class="btn btn-share" onclick="sharePrediction()">
                <i class="fa-brands fa-telegram"></i> Поделиться предсказанием
            </button>
            <button class="btn btn-share" style="border:none; background:transparent; opacity: 0.5;"
                onclick="resetApp()">
                Сброс (Новый день)
            </button>
        </div>
    </div>

    <!-- Ad UI -->
    <div class="ad-loader" id="ad-loader">
        <div class="spinner"></div>
        <h3>Смотрим рекламу...</h3>
        <p>Магия загружается</p>
    </div>

    <script>
        // --- Data ---
        const MAJOR_ARCANA = [
            { id: 0, name: "0. Шут", image: "https://upload.wikimedia.org/wikipedia/en/9/90/RWS_Tarot_00_Fool.jpg", short: "Новое начало, свобода, спонтанность", full: "Шут — это символ чистого потенциала. Вы стоите на краю пропасти, готовые шагнуть в неизвестное. Это карта новых начинаний, когда старый багаж оставлен позади. Она призывает довериться Вселенной и позволить себе быть немного безрассудным.", advice: "Рискните и начните с чистого листа." },
            { id: 1, name: "I. Маг", image: "https://upload.wikimedia.org/wikipedia/en/d/de/RWS_Tarot_01_Magician.jpg", short: "Сила воли, мастерство, ресурсы", full: "Маг напоминает, что у вас есть все необходимые инструменты для достижения цели. Вы — творец своей реальности. Сейчас идеальное время для активных действий и реализации задуманного.", advice: "Используйте свои навыки и действуйте уверенно." },
            { id: 2, name: "II. Жрица", image: "https://upload.wikimedia.org/wikipedia/en/8/88/RWS_Tarot_02_High_Priestess.jpg", short: "Интуиция, тайны, подсознание", full: "Жрица призывает обратиться к своему внутреннему миру. Логика сейчас бессильна, ответы лежат в снах и предчувствиях. Это время пассивного ожидания и наблюдения.", advice: "Слушайте свой внутренний голос." },
            { id: 3, name: "III. Императрица", image: "https://upload.wikimedia.org/wikipedia/en/d/d2/RWS_Tarot_03_Empress.jpg", short: "Плодородие, изобилие, забота", full: "Императрица — это архетип Матери. Она несет энергию роста, процветания и чувственности. Это отличное время для творчества, заботы о себе и близких, а также для финансовых дел.", advice: "Наслаждайтесь жизнью и будьте щедры." },
            { id: 4, name: "IV. Император", image: "https://upload.wikimedia.org/wikipedia/en/c/c3/RWS_Tarot_04_Emperor.jpg", short: "Власть, структура, дисциплина", full: "Император требует порядка. Хаос должен быть структурирован. Это карта лидера, отца, начальника. Она говорит о необходимости следовать правилам и брать на себя ответственность.", advice: "Наведите порядок в делах и мыслях." },
            { id: 5, name: "V. Иерофант", image: "https://upload.wikimedia.org/wikipedia/en/8/8d/RWS_Tarot_05_Hierophant.jpg", short: "Традиция, обучение, духовность", full: "Иерофант символизирует установленные нормы и передачу знаний. Возможно, вам нужен совет наставника или следование проверенным путем. Это не время для бунта.", advice: "Следуйте традициям и учитесь у мудрых." },
            { id: 6, name: "VI. Влюбленные", image: "https://upload.wikimedia.org/wikipedia/en/d/db/RWS_Tarot_06_Lovers.jpg", short: "Выбор, союз, гармония", full: "Влюбленные — это не только про романтику, но и про важный жизненный выбор, который нужно сделать сердцем. Это карта союза противоположностей и поиска гармонии.", advice: "Выбирайте сердцем, а не только разумом." },
            { id: 7, name: "VII. Колесница", image: "https://upload.wikimedia.org/wikipedia/en/9/9b/RWS_Tarot_07_Chariot.jpg", short: "Победа, движение, контроль", full: "Колесница означает триумф воли. Вы движетесь вперед, несмотря на препятствия. Главное здесь — держать поводья в руках и не давать эмоциям сбить вас с пути.", advice: "Двигайтесь к цели, не сбавляя темпа." },
            { id: 8, name: "VIII. Сила", image: "https://upload.wikimedia.org/wikipedia/en/f/f5/RWS_Tarot_08_Strength.jpg", short: "Внутренняя сила, терпение", full: "Настоящая сила не в агрессии, а в мягкости и терпении. Вы способны укротить своего внутреннего зверя любовью и пониманием. Вы сильнее, чем думаете.", advice: "Проявите терпение и великодушие." },
            { id: 9, name: "IX. Отшельник", image: "https://upload.wikimedia.org/wikipedia/en/4/4d/RWS_Tarot_09_Hermit.jpg", short: "Уединение, поиск истины", full: "Отшельник уходит от суеты мира, чтобы найти ответы внутри себя. Это период самоанализа. Вам нужно побыть одному, чтобы понять, куда двигаться дальше.", advice: "Возьмите паузу и побудьте наедине с собой." },
            { id: 10, name: "X. Колесо Фортуны", image: "https://upload.wikimedia.org/wikipedia/en/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg", short: "Перемены, судьба, цикл", full: "Жизнь циклична — то вверх, то вниз. Колесо напоминает, что все временно. Ждите перемен, которые не зависят от вас. Доверьтесь потоку событий.", advice: "Примите перемены как неизбежное благо." },
            { id: 11, name: "XI. Справедливость", image: "https://upload.wikimedia.org/wikipedia/en/e/e0/RWS_Tarot_11_Justice.jpg", short: "Закон, правда, карма", full: "Что посеешь, то и пожнешь. Справедливость требует честности перед собой и другими. Решение будет принято объективно. Если вы правы — не бойтесь.", advice: "Будьте честны и объективны." },
            { id: 12, name: "XII. Повешенный", image: "https://upload.wikimedia.org/wikipedia/en/2/2b/RWS_Tarot_12_Hanged_Man.jpg", short: "Жертва, пауза, другой взгляд", full: "Ситуация зависла, и биться головой об стену бесполезно. Нужно изменить угол зрения. Иногда нужно чем-то пожертвовать, чтобы получить большее.", advice: "Посмотрите на ситуацию под другим углом." },
            { id: 13, name: "XIII. Смерть", image: "https://upload.wikimedia.org/wikipedia/en/d/d7/RWS_Tarot_13_Death.jpg", short: "Трансформация, конец, обновление", full: "Не бойтесь, это не физическая смерть. Это конец, который необходим для нового начала. Что-то в вашей жизни отжило свое. Отпустите это.", advice: "Отпустите прошлое, чтобы впустить будущее." },
            { id: 14, name: "XIV. Умеренность", image: "https://upload.wikimedia.org/wikipedia/en/f/f8/RWS_Tarot_14_Temperance.jpg", short: "Баланс, исцеление, мера", full: "Ангел переливает воду из кубка в кубок, ища идеальную пропорцию. Это карта золотой середины. Избегайте крайностей, ищите компромисс и душевный покой.", advice: "Соблюдайте меру во всем." },
            { id: 15, name: "XV. Дьявол", image: "https://upload.wikimedia.org/wikipedia/en/5/55/RWS_Tarot_15_Devil.jpg", short: "Зависимость, искушение, эго", full: "Дьявол показывает наши теневые стороны, зависимости и материальные привязки. Вы можете чувствовать себя в ловушке, но цепи часто висят свободно. Выбор за вами.", advice: "Осознайте свои слабости и освободитесь от них." },

            'cross': { name: 'Кельтский Крест', count: 10, labels: ['1. Ситуация', '2. Влияние', '3. Сознание', '4. Подсознание', '5. Прошлое', '6. Будущее', '7. Вы', '8. Окружение', '9. Надежды', '10. Итог'] }
        };

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            tg.expand();
            tg.ready();

            // 1. Auto-Detect Telegram Premium (Grant App Premium automatically)
            const user = tg.initDataUnsafe?.user;
            const hasTelegramPremium = user?.is_premium === true;

            // 2. Load Local State (Manual Dev Override or purchsed)
            const storedPremium = localStorage.getItem(KEYS.IS_PREMIUM) === 'true';

            // 3. Final State: True if TG Premium OR Stored Premium
            state.isPremium = hasTelegramPremium || storedPremium;

            // Save effective state to ensure consistency
            localStorage.setItem(KEYS.IS_PREMIUM, state.isPremium);

            if (hasTelegramPremium) {
                console.log("Telegram Premium Detected -> Granting Access");
            }

            updateUI();

            // Restore Draw
            const today = new Date().toISOString().split('T')[0];
            const lastDraw = JSON.parse(localStorage.getItem(KEYS.LAST_DRAW));

            if (lastDraw && lastDraw.date === today) {
                state.selectedSpread = lastDraw.spreadType;
                state.adWatched = localStorage.getItem(KEYS.AD_WATCHED) === 'true';
                // Ad Logic check: If Premium, we assume ad requirements are bypassed
                if (state.isPremium) state.adWatched = true;

                showResult(lastDraw.cards, lastDraw.spreadType, false);
            } else {
                localStorage.setItem(KEYS.AD_WATCHED, 'false');
                showScreen('home-screen');
            }
        });

        // --- Logic ---
        function togglePremium() {
            // Manual Toggle (Dev Tool)
            // Note: If user has REAL TG Premium, this toggle might need to be "force disable" to test free flow?
            // For now, let's just invert the current state for testing purposes.
            state.isPremium = !state.isPremium;
            localStorage.setItem(KEYS.IS_PREMIUM, state.isPremium);

            updateUI();

            // Refresh result if active
            const resultScreen = document.getElementById('result-screen');
            if (resultScreen.classList.contains('active')) {
                const lastDraw = JSON.parse(localStorage.getItem(KEYS.LAST_DRAW));
                if (lastDraw) showResult(lastDraw.cards, state.selectedSpread, false);
            }
        }

        function updateUI() {
            const btn = document.getElementById('dev-btn');
            if (btn) {
                btn.textContent = state.isPremium ? 'DEV: Premium User' : 'DEV: Free User';
                btn.classList.toggle('premium-badge', state.isPremium);
            }
        }

        // Direct draw trigger (Single Entry)
        function tryDraw() {
            // Force reset to standard flow
            state.selectedSpread = 'three';
            performDraw();
        }

        function startCrossReading() {
            state.selectedSpread = 'cross';
            performDraw();
        }

        function performDraw() {
            const deck = document.getElementById('deck');
            if (deck.classList.contains('processing')) return;
            deck.classList.add('processing');

            const cardBack = deck.querySelector('.card-back');
            cardBack.classList.add('card-shaking');

            setTimeout(() => {
                cardBack.classList.remove('card-shaking');
                deck.classList.remove('processing');

                const srcDeck = state.isPremium ? FULL_DECK : MAJOR_ARCANA;
                const spreadMeta = SPREAD_INFO[state.selectedSpread];
                const count = spreadMeta.count;

                const shuffled = [...srcDeck].sort(() => 0.5 - Math.random());
                const resultCards = shuffled.slice(0, count);

                const today = new Date().toISOString().split('T')[0];
                localStorage.setItem(KEYS.LAST_DRAW, JSON.stringify({
                    date: today,
                    spreadType: state.selectedSpread,
                    cards: resultCards
                }));

                state.adWatched = false;
                localStorage.setItem(KEYS.AD_WATCHED, 'false');

                showResult(resultCards, state.selectedSpread, true);
            }, 800);
        }

        function showResult(cards, spreadType, animate) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            const spreadMeta = SPREAD_INFO[spreadType];

            // Logic: 
            // If 'three' spread:
            //   - !adWatched && !Premium: Show only Card 0. Button "Reveal Rest (Ad)".
            //   - adWatched || Premium: Show 0, 1, 2.

            let visibleCount = cards.length;
            let showAdButton = false;

            if (spreadType === 'three') {
                if (!state.isPremium && !state.adWatched) {
                    visibleCount = 1;
                    showAdButton = true;
                }
            }

            const cardsToShow = cards.slice(0, visibleCount);

            cardsToShow.forEach((card, index) => {
                const wrapper = document.createElement('div');
                wrapper.style.display = 'flex';
                wrapper.style.flexDirection = 'column';
                wrapper.style.alignItems = 'center';
                wrapper.style.width = '100%';

                // Label
                const badge = document.createElement('div');
                badge.className = 'spread-position-label';

                // Polish: If only showing 1 card in this "Partial" mode, call it "Card of the Day".
                // When revealed, it becomes "Reason" (Причина) as part of the trio.
                if (visibleCount === 1 && index === 0) {
                    badge.textContent = 'Карта Дня';
                } else {
                    badge.textContent = spreadMeta.labels[index] || `Карта ${index + 1}`;
                }
                wrapper.appendChild(badge);

                // Card
                const el = document.createElement('div');
                el.className = 'result-card-container';
                el.innerHTML = `
                    <div class="result-card ${animate ? '' : 'flipped'}" style="transition-delay: ${index * 0.15}s">
                        <div class="card-face back"><i class="fa-solid fa-eye"></i></div>
                        <div class="card-face front">
                            <img src="${card.image}" class="card-image">
                        </div>
                    </div>
                `;
                wrapper.appendChild(el);

                // Info
                const info = document.createElement('div');
                info.className = 'card-info';
                info.innerHTML = `
                    <h3 style="margin-top:15px">${card.name}</h3>
                    <p class="card-short">${card.short}</p>
                    <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; width:100%; text-align:left; font-size:0.9rem; line-height:1.5;">
                        <strong style="color:var(--accent-gold);">Значение:</strong> ${card.full}<br><br>
                        <strong style="color:var(--accent-gold);">Совет:</strong> ${card.advice}
                    </div>
                `;
                wrapper.appendChild(info);

                container.appendChild(wrapper);

                if (animate) {
                    setTimeout(() => {
                        const cardEl = el.querySelector('.result-card');
                        if (cardEl) cardEl.classList.add('flipped');
                    }, 100 + (index * 200));
                }
            });

            // --- Combined Synthesis (Interpretation) ---
            // Only show if we have > 1 card and they are all visible (not partial reveal)
            if (!showAdButton && cardsToShow.length > 1 && spreadType === 'three') {
                const synthesisDiv = document.createElement('div');
                synthesisDiv.style.width = '100%';
                synthesisDiv.style.marginTop = '10px';
                synthesisDiv.style.padding = '20px';
                synthesisDiv.style.background = 'linear-gradient(180deg, rgba(75, 0, 130, 0.4) 0%, rgba(26, 11, 46, 0.6) 100%)';
                synthesisDiv.style.border = '1px solid var(--accent-gold)';
                synthesisDiv.style.borderRadius = '12px';
                synthesisDiv.style.boxShadow = '0 0 15px rgba(255, 215, 0, 0.1)';

                synthesisDiv.innerHTML = `
                    <h3 style="color:var(--accent-gold); margin-top:0; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">
                        <i class="fa-solid fa-scroll"></i> Общее толкование
                    </h3>
                    <p style="font-size:0.95rem; line-height:1.6; font-style: italic; color:#e0e0e0;">
                        "Ваш путь начинается с энергии <strong>${cards[0].name}</strong> (${cards[0].short.toLowerCase()}). 
                        В этой ситуации на вас влияет <strong>${cards[1].name}</strong>, принося ${cards[1].short.toLowerCase()}. 
                        В итоге, если вы прислушаетесь к совету, вас ждет <strong>${cards[2].name}</strong>: ${cards[2].short.toLowerCase()}."
                    </p>
                `;
                container.appendChild(synthesisDiv);
            }

            // Actions Block
            const actionsDiv = document.createElement('div');
            actionsDiv.style.width = '100%';
            actionsDiv.style.marginTop = '20px';
            actionsDiv.style.display = 'flex';
            actionsDiv.style.flexDirection = 'column';
            actionsDiv.style.gap = '15px';

            if (showAdButton) {
                // "Reveal Future" Button - Thematic Text
                const adBtn = document.createElement('button');
                adBtn.className = 'btn';
                adBtn.style.background = 'linear-gradient(45deg, #FFD700, #DAA520)';
                adBtn.style.color = '#000';
                adBtn.style.fontWeight = 'bold';
                // "Reveal your future" - Mystical and inviting
                adBtn.innerHTML = '<i class="fa-solid fa-eye"></i> Раскрыть своё будущее (Видео)';
                adBtn.onclick = watchAd;
                actionsDiv.appendChild(adBtn);

                // Show Upsell HERE too (Step 2)
                if (!state.isPremium) {
                    const upsellDiv = document.createElement('div');
                    upsellDiv.className = 'premium-block';
                    upsellDiv.style.marginTop = '10px';
                    upsellDiv.style.border = '1px solid rgba(255, 215, 0, 0.3)';
                    upsellDiv.style.padding = '15px';
                    upsellDiv.style.borderRadius = '12px';
                    upsellDiv.style.background = 'rgba(255, 215, 0, 0.05)';
                    upsellDiv.style.textAlign = 'center';

                    upsellDiv.innerHTML = `
                        <p style="font-size:0.8rem; color:#ccc; margin-bottom:10px;">
                            <i class="fa-solid fa-crown" style="color:var(--accent-gold)"></i> 
                            Premium пользователи видят всё сразу
                        </p>
                        <button class="btn" style="width:100%; font-size: 0.8rem; padding: 8px;" onclick="tg.showPopup({title:'Premium', message:'Покупка в разработке'})">
                            Стать Premium
                        </button>
                    `;
                    actionsDiv.appendChild(upsellDiv);
                }

            } else {
                // Full Result Logic
                const shareBtn = document.createElement('button');
                shareBtn.className = 'btn btn-share';
                shareBtn.innerHTML = '<i class="fa-brands fa-telegram"></i> Поделиться предсказанием';
                shareBtn.onclick = sharePrediction;
                actionsDiv.appendChild(shareBtn);

                const resetBtn = document.createElement('button');
                resetBtn.className = 'btn btn-share';
                resetBtn.style.border = 'none';
                resetBtn.style.background = 'transparent';
                resetBtn.style.opacity = '0.5';
                resetBtn.textContent = 'Сброс (Новый день)';
                resetBtn.onclick = resetApp;
                actionsDiv.appendChild(resetBtn);

                // Premium Upsell / Cross Link
                const upsellDiv = document.createElement('div');
                upsellDiv.className = 'premium-block';
                upsellDiv.style.marginTop = '20px';
                upsellDiv.style.border = '1px solid var(--accent-gold)';
                upsellDiv.style.padding = '20px';
                upsellDiv.style.borderRadius = '12px';
                upsellDiv.style.background = 'rgba(255, 215, 0, 0.05)';
                upsellDiv.style.textAlign = 'center';

                if (!state.isPremium) {
                    // Free User -> Upsell
                    upsellDiv.innerHTML = `
                        <h3 style="color:var(--accent-gold); margin:0 0 10px 0;"><i class="fa-solid fa-crown"></i> Mystic Premium</h3>
                        <p style="font-size:0.9rem; color:#ccc; margin-bottom:15px;">
                            Хочешь узнать больше? Оформи Premium и открой расклад <strong>"Кельтский Крест"</strong> (10 карт) с полным анализом.
                        </p>
                        <button class="btn" style="width:100%; justify-content:center;" onclick="tg.showPopup({title:'Premium', message:'Покупка в разработке'})">
                            Оформить Premium
                        </button>
                    `;
                    actionsDiv.appendChild(upsellDiv);
                } else if (spreadType !== 'cross') {
                    // Premium User -> Link to Cross
                    upsellDiv.innerHTML = `
                        <h3 style="color:var(--accent-gold); margin:0 0 10px 0;"><i class="fa-solid fa-crown"></i> Mystic Premium</h3>
                        <p style="font-size:0.9rem; color:#ccc; margin-bottom:15px;">
                            Ваш статус позволяет использовать полный расклад <strong>"Кельтский Крест"</strong>.
                        </p>
                        <button class="btn" style="width:100%; justify-content:center;" onclick="startCrossReading()">
                            Открыть Кельтский Крест (10 карт)
                        </button>
                    `;
                    actionsDiv.appendChild(upsellDiv);
                }
            }

            container.appendChild(actionsDiv);
            document.getElementById('result-title').textContent = spreadMeta.name;
            showScreen('result-screen');
        }

        function watchAd() {
            // Adsgram Integration (Production)

            const unlockContent = () => {
                state.adWatched = true;
                localStorage.setItem(KEYS.AD_WATCHED, 'true');
                const lastDraw = JSON.parse(localStorage.getItem(KEYS.LAST_DRAW));
                if (lastDraw) showResult(lastDraw.cards, state.selectedSpread, true);
            };

            try {
                if (!window.Adsgram) {
                    // SDK not loaded - fallback unlock
                    console.warn("Adsgram SDK not loaded.");
                    unlockContent();
                    return;
                }

                const AdController = window.Adsgram.init({ blockId: "int-22202" });

                AdController.show().then((result) => {
                    if (result.done) {
                        // User watched to end
                        tg.showPopup({ title: 'Судьба открыта', message: 'Вселенная благодарит вас за терпение.' });
                        unlockContent();
                    } else {
                        // User skipped
                        tg.showPopup({ title: 'Внимание', message: 'Чтобы узнать судьбу, нужно досмотреть видео до конца.' });
                    }
                }).catch((err) => {
                    // Ad error - fallback unlock
                    console.error("Adsgram error:", err);
                    unlockContent();
                });

            } catch (e) {
                console.error("Ad exception:", e);
                unlockContent();
            }
        }

        function sharePrediction() {
            const url = "https://t.me/Intarius_bot";
            const text = "Я открыл своё будущее в Mystic Tarot. Попробуй и ты!";
            const fullUrl = `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
            tg.openTelegramLink ? tg.openTelegramLink(fullUrl) : window.open(fullUrl, '_blank');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function resetApp() {
            localStorage.clear();
            location.reload();
        }

        // Particles
        const pContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.width = Math.random() * 3 + 'px';
            s.style.height = s.style.width;
            s.style.animationDelay = Math.random() * 5 + 's';
            pContainer.appendChild(s);
        }
    </script>
</body>

</html>
