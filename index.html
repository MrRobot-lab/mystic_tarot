    <link rel="preconnect" href="https://fonts.googleapis.com">

        rel="stylesheet">

    <style>
        :root {
            --bg-color-start: #1a0b2e;
            --bg-color-end: #000000;
            --accent-gold: #ffd700;
            --accent-purple: #4b0082;
            --text-main: #ffffff;
            --text-secondary: #cccccc;
            --card-width: 200px;
            --card-height: 320px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background: radial-gradient(circle at center, var(--bg-color-start), var(--bg-color-end));
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Background Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle 4s infinite ease-in-out;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.5);
            }
        }

        /* Main Container */
        .app-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1,
        h2,
        h3 {
            font-family: 'Cinzel', serif;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            text-align: center;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Home Screen */
        .deck-container {
            margin-top: 40px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-back {
            width: var(--card-width);
            height: var(--card-height);
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0b2e 100%);
            border: 2px solid var(--accent-gold);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(75, 0, 130, 0.5), inset 0 0 15px rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            animation: breath 3s infinite ease-in-out;
        }

        .card-back::after {
            content: '';
            position: absolute;
            width: 80%;
            height: 90%;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
        }

        .card-back i {
            font-size: 3rem;
            color: var(--accent-gold);
            opacity: 0.8;
        }

        @keyframes breath {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(75, 0, 130, 0.5);
            }

            50% {
                transform: scale(1.02);
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            }
        }

        .card-shaking {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        /* Result Screen */
        .result-card-container {
            perspective: 1000px;
            width: var(--card-width);
            height: var(--card-height);
            margin-bottom: 20px;
        }

        .result-card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s, top 1s;
            animation: cardAppear 1s ease-out forwards;
        }

        /* 3D Flip */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            border: 2px solid var(--accent-gold);
            overflow: hidden;
        }

        .card-face.front {
            background: #1a0b2e;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
        }

        .card-face.back {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0b2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-face.back i {
            font-size: 3rem;
            color: var(--accent-gold);
        }

        .result-card.flipped {
            transform: rotateY(180deg);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.8);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card-info {
            text-align: center;
            width: 100%;
            padding: 0 10px;
        }

        .card-short {
            margin-bottom: 20px;
            font-style: italic;
            color: var(--text-secondary);
        }

        .premium-block {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .premium-content {
            transition: filter 0.5s ease;
        }

        .blurred {
            filter: blur(8px);
            user-select: none;
        }

        .unlock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            z-index: 5;
            transition: opacity 0.3s;
        }

        .unlock-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .btn {
            background: linear-gradient(45deg, #4b0082, #2d1b4e);
            border: 1px solid var(--accent-gold);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 25px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            margin: 5px 0;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-gold {
            background: linear-gradient(45deg, var(--accent-gold), #b8860b);
            color: #000;
            border: none;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .btn-share {
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.9rem;
        }

        .advice-box {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .advice-label {
            color: var(--accent-gold);
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        /* Loading Overlay for Ad */
        .ad-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--accent-gold);
        }

        .ad-loader.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 215, 0, 0.3);
            border-top: 4px solid var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

            {
                "id": 17,
                "name": "XVII. Звезда (The Star)",
                "image": "https://upload.wikimedia.org/wikipedia/en/d/db/RWS_Tarot_17_Star.jpg",
                "short": "Надежда, вдохновение, духовность, исцеление.",
                "full": "Путeводная звезда светит вам. Это время исцеления и возобновления надежд. Верьте в себя и свое будущее, Вселенная поддерживает вас.",
                "advice": "Верьте в свою мечту и следуйте за вдохновением."
            },
            {
                "id": 18,
                "name": "XVIII. Луна (The Moon)",
                "image": "https://upload.wikimedia.org/wikipedia/en/7/7f/RWS_Tarot_18_Moon.jpg",
                "short": "Иллюзии, интуиция, страхи, неопределенность.",
                "full": "В лунном свете все кажется иным. Доверяйте своим инстинктам, но остерегайтесь самообмана и иллюзий. Путь может быть неясен, идите осторожно.",
                "advice": "Будьте внимательны и доверяйте своему чутью."
            },
            {
                "id": 19,
                "name": "XIX. Солнце (The Sun)",
                "image": "https://upload.wikimedia.org/wikipedia/en/1/17/RWS_Tarot_19_Sun.jpg",
                "short": "Радость, успех, позитив, жизненная сила.",
                "full": "Солнце освещает вашу жизнь радостью и успехом. Это время для счастья, ясности и теплых отношений. Наслаждайтесь моментом.",
                "advice": "Сияйте и делитесь своей радостью с миром."
            },
            {
                "id": 20,
                "name": "XX. Суд (Judgement)",
                "image": "https://upload.wikimedia.org/wikipedia/en/d/dd/RWS_Tarot_20_Judgement.jpg",
                "short": "Возрождение, призыв, прощение, пробуждение.",
                "full": "Пришло время подвести итоги и возродиться к новой жизни. Оставьте прошлое позади и откликнитесь на призыв своей судьбы.",
                "advice": "Простите себя и других, начните с чистого листа."
            },
            {
                "id": 21,
                "name": "XXI. Мир (The World)",
                "image": "https://upload.wikimedia.org/wikipedia/en/f/ff/RWS_Tarot_21_World.jpg",
                "short": "Завершение, целостность, гармония, достижение.",
                "full": "Вы пришли к финишу и достигли цели. Мир у ваших ног. Это момент триумфа и гармонии с вселенной.",
                "advice": "Празднуйте свои достижения и наслаждайтесь полнотой жизни."
            }
        ];

        // --- State & Constants ---
        const tg = window.Telegram.WebApp;
        const KEYS = {
            DATE: 'mystic_tarot_last_date',
            CARD_ID: 'mystic_tarot_card_id',
            AD_WATCHED: 'mystic_tarot_ad_watched'
        };

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
            createParticles();
        });

        function initApp() {
            // Telegram Init
            tg.expand();
            tg.ready();

            // Theme params check (optional sync)
            if (tg.colorScheme === 'dark') {
                document.documentElement.style.setProperty('--bg-color-start', '#1a0b2e');
            }

            // Check storage
            const today = new Date().toISOString().split('T')[0];
            const lastDate = localStorage.getItem(KEYS.DATE);

            if (lastDate === today) {
                // Already drawn today
                const cardId = parseInt(localStorage.getItem(KEYS.CARD_ID));
                const adWatched = localStorage.getItem(KEYS.AD_WATCHED) === 'true';
                showResult(cardId, adWatched, false); // false = no animation
            } else {
                // New day
                showScreen('home-screen');
            }
        }

        // --- Core Logic ---

        function drawCard() {
            // Prevent double clicks
            const deck = document.getElementById('deck');
            if (deck.classList.contains('processing')) return;
            deck.classList.add('processing');

            // 1. Shake animation
            const cardBack = deck.querySelector('.card-back');
            cardBack.classList.remove('card-shaking');
            void cardBack.offsetWidth; // trigger reflow
            cardBack.classList.add('card-shaking');

            // 2. Wait for shake, then generate result
            setTimeout(() => {
                // Random Card
                const randomIndex = Math.floor(Math.random() * TAROT_DATA.length);
                const card = TAROT_DATA[randomIndex];

                // Save state
                const today = new Date().toISOString().split('T')[0];
                localStorage.setItem(KEYS.DATE, today);
                localStorage.setItem(KEYS.CARD_ID, card.id);
                localStorage.setItem(KEYS.AD_WATCHED, 'false');

                // Show Result with animation
                showResult(card.id, false, true); // true = animate flip
            }, 600);
        }

        function showResult(cardId, adWatched, animate) {
            const card = TAROT_DATA.find(c => c.id === cardId) || TAROT_DATA[0];

            // Fill Data
            document.getElementById('card-name').textContent = card.name;
            document.getElementById('card-img').src = card.image;
            document.getElementById('card-short').textContent = card.short;
            document.getElementById('card-full').textContent = card.full;
            document.getElementById('card-advice').textContent = card.advice;

            // Ad Status
            if (adWatched) {
                unlockPremiumContent();
            } else {
                lockPremiumContent();
            }

            showScreen('result-screen');

            // Flip Animation logic
            const resultCardEl = document.getElementById('result-card-el');
            if (animate) {
                // Start unflipped
                resultCardEl.classList.remove('flipped');
                // Wait a moment for layout then flip
                setTimeout(() => {
                    resultCardEl.classList.add('flipped');
                }, 100);
            } else {
                // Immediate
                resultCardEl.classList.add('flipped');
            }
        }

        // --- Monetization ---

        function watchAd() {
            // Simulate Ad
            const loader = document.getElementById('ad-loader');
            loader.classList.add('active');

            setTimeout(() => {
                loader.classList.remove('active');

                // Success
                localStorage.setItem(KEYS.AD_WATCHED, 'true');
                unlockPremiumContent();

                // Optional: Haptic feedback
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('success');
                }
            }, 3000);
        }

        function unlockPremiumContent() {
            document.getElementById('premium-text').classList.remove('blurred');
            document.getElementById('blur-overlay').classList.add('hidden');
        }

        function lockPremiumContent() {
            document.getElementById('premium-text').classList.add('blurred');
            document.getElementById('blur-overlay').classList.remove('hidden');
        }

        // --- Sharing ---

        function sharePrediction() {
            const cardId = localStorage.getItem(KEYS.CARD_ID);
            const card = TAROT_DATA.find(c => c.id == cardId);

            let text = `✨ Intarius расскажет твое будущее.\n\nМне выпала карта: ${card ? card.name : 'Таро'}!`;
            const url = "https://t.me/Intarius_bot";

            // Encode
            const fullUrl = `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;

            if (tg.openTelegramLink) {
                tg.openTelegramLink(fullUrl);
            } else {
                window.open(fullUrl, '_blank');
            }
        }

        // --- Utils ---

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');

                // Random Pos
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const size = Math.random() * 3 + 1; // 1-4px
                const duration = Math.random() * 3 + 2; // 2-5s
                const delay = Math.random() * 5;

                star.style.left = x + '%';
                star.style.top = y + '%';
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDuration = duration + 's';
                star.style.animationDelay = delay + 's';

                container.appendChild(star);
            }
        }

        function resetApp() {
            if (confirm('Сбросить прогресс и начать заново?')) {
                localStorage.clear();
                location.reload();
            }
        }

    </script>
