<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INTARIUS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <style>
        :root {
            --bg-color-start: #1a0b2e;
            --bg-color-end: #000000;
            --accent-gold: #ffd700;
            --accent-purple: #4b0082;
            --text-main: #ffffff;
            --text-secondary: #cccccc;
            --card-width: 200px;
            --card-height: 320px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background: radial-gradient(circle at center, var(--bg-color-start), var(--bg-color-end));
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle 4s infinite ease-in-out;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.5);
            }
        }

        .app-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1,
        h2,
        h3 {
            font-family: 'Cinzel', serif;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            text-align: center;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Home */
        .deck-container {
            margin-top: 20px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-back {
            width: var(--card-width);
            height: var(--card-height);
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0b2e 100%);
            border: 2px solid var(--accent-gold);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(75, 0, 130, 0.5), inset 0 0 15px rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            animation: breath 3s infinite ease-in-out;
        }

        .card-back::after {
            content: '';
            position: absolute;
            width: 80%;
            height: 90%;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
        }

        .card-back i {
            font-size: 3rem;
            color: var(--accent-gold);
            opacity: 0.8;
        }

        @keyframes breath {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(75, 0, 130, 0.5);
            }

            50% {
                transform: scale(1.02);
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            }
        }

        .card-shaking {
            animation: flipCard 1s ease-in-out both;
        }

        @keyframes flipCard {
            0% {
                transform: rotateY(0deg);
            }

            100% {
                transform: rotateY(180deg);
            }
        }

        /* Spread Selector */
        .spread-selector {
            margin-top: 30px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .spread-option {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .spread-option.selected {
            background: rgba(255, 215, 0, 0.1);
            border-color: var(--accent-gold);
        }

        .spread-option.locked {
            opacity: 0.6;
        }

        .spread-option i {
            margin-right: 15px;
            font-size: 1.2rem;
            color: var(--accent-gold);
            width: 25px;
            text-align: center;
        }

        /* Status Badges */
        .badge {
            position: absolute;
            right: 10px;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid;
        }

        .badge-ad {
            color: #aaaaff;
            border-color: #aaaaff;
        }

        .badge-premium {
            color: #ffaa00;
            border-color: #ffaa00;
        }

        .badge-locked {
            color: #ff4444;
            border-color: #ff4444;
        }

        .spread-info h4 {
            margin: 0;
            color: var(--text-main);
            font-family: 'Cinzel', serif;
        }

        .spread-info p {
            margin: 5px 0 0;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Result */
        .cards-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 40px;
            margin-bottom: 20px;
        }

        .spread-position-label {
            text-align: center;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--accent-gold);
            margin-bottom: 10px;
            opacity: 0.8;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 5px;
            width: 80%;
        }

        .result-card-container {
            perspective: 1200px;
            width: var(--card-width);
            height: var(--card-height);
        }

        .result-card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0.0, 0.2, 1);
            will-change: transform;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            border: 2px solid var(--accent-gold);
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .card-face.front {
            background: #1a0b2e;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
        }

        .card-face.back {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0b2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow:
                0 0 30px rgba(255, 215, 0, 0.2),
                inset 0 0 60px rgba(75, 0, 130, 0.3);
        }

        .card-face.back i {
            font-size: 3rem;
            color: var(--accent-gold);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                opacity: 0.7;
                text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 25px rgba(255, 215, 0, 0.9);
            }
        }

        .result-card.flipped {
            transform: rotateY(180deg);
        }

        .result-card.flipped .card-face.front {
            box-shadow:
                0 0 40px rgba(255, 215, 0, 0.3),
                0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.8);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card-info {
            text-align: center;
            width: 100%;
            padding: 0 10px;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .card-info.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card-short {
            margin-bottom: 20px;
            font-style: italic;
            color: var(--text-secondary);
        }

        /* Premium synthesis block animation */
        .synthesis-block {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s ease-out, transform 1s ease-out;
        }

        .synthesis-block.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .btn {
            background: linear-gradient(45deg, #4b0082, #2d1b4e);
            border: 1px solid var(--accent-gold);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 25px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            margin: 5px 0;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-share {
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.9rem;
        }

        .btn-gold {
            background: linear-gradient(45deg, var(--accent-gold), #b8860b);
            color: #000;
            border: none;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .advice-box {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .advice-label {
            color: var(--accent-gold);
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        /* Dev Button */
        .dev-btn {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            padding: 5px 10px;
            font-size: 0.7rem;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
        }

        .premium-badge {
            color: var(--accent-gold);
            border-color: var(--accent-gold);
            opacity: 1;
        }

        /* Premium Content Blur Effect */
        .premium-content {
            transition: filter 0.5s ease;
        }

        .premium-content.blurred {
            filter: blur(8px);
            user-select: none;
        }

        .unlock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            z-index: 5;
            transition: opacity 0.3s;
            border-radius: 12px;
        }

        .unlock-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .ad-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--accent-gold);
        }

        .ad-loader.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 215, 0, 0.3);
            border-top: 4px solid var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="particles" id="particles"></div>
    <button id="dev-btn" class="dev-btn" onclick="togglePremium()">DEV: Free User</button>

    <div class="app-container">
        <!-- Home Screen -->
        <div id="home-screen" class="screen">
            <h1>Карта твоего дня</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 20px;">
                Сосредоточься на вопросе
            </p>

            <div class="deck-container" id="deck" onclick="tryDraw()">
                <div class="card-back">
                    <i class="fa-solid fa-eye"></i>
                </div>
            </div>

            <!-- Spread Selector (Hidden for Single Entry Flow) -->
            <div class="spread-selector" style="display: none;">
                <div class="spread-option selected" id="opt-one" onclick="selectSpread('one')">
                    <i class="fa-solid fa-note-sticky"></i>
                    <div class="spread-info">
                        <h4>Карта дня</h4>
                        <p>Совет на сегодня</p>
                    </div>
                </div>

                <div class="spread-option" id="opt-three" onclick="selectSpread('three')">
                    <i class="fa-solid fa-layer-group"></i>
                    <div class="spread-info">
                        <h4>Три карты</h4>
                        <p>Причина • Ситуация • Исход</p>
                    </div>
                    <span class="badge badge-ad" id="badge-three">AD</span>
                </div>

                <div class="spread-option locked" id="opt-cross" onclick="selectSpread('cross')">
                    <i class="fa-solid fa-cross"></i>
                    <div class="spread-info">
                        <h4>Кельтский крест</h4>
                        <p>Полный анализ (10 карт)</p>
                    </div>
                    <span class="badge badge-locked" id="badge-cross"><i class="fa-solid fa-lock"></i></span>
                </div>
            </div>

            <p style="margin: 20px 0; font-size: 0.9rem; opacity: 0.7;">
                Нажми на колоду для начала
            </p>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <h2 id="result-title" style="margin-bottom: 20px;">Результат</h2>

            <div id="cards-container" class="cards-layout">
                <!-- Cards will be injected here -->
            </div>

            <button class="btn btn-share" onclick="sharePrediction()">
                <i class="fa-brands fa-telegram"></i> Поделиться предсказанием
            </button>
            <button class="btn btn-share" style="border:none; background:transparent; opacity: 0.5;"
                onclick="resetApp()">
                Сброс (Новый день)
            </button>
        </div>
    </div>

    <!-- Ad UI -->
    <div class="ad-loader" id="ad-loader">
        <div class="spinner"></div>
        <h3>Смотрим рекламу...</h3>
        <p>Магия загружается</p>
    </div>

    <script>
        // --- Data ---
        const MAJOR_ARCANA = [
            { id: 0, name: "0. Шут", narrative: "сделать смелый шаг в неизвестность", element: "air", keywords: ["начало", "свобода", "риск", "потенциал"], image: "https://upload.wikimedia.org/wikipedia/en/9/90/RWS_Tarot_00_Fool.jpg", short: "Новое начало, свобода духа", full: "Знаешь это чувство, когда хочется всё бросить и начать с нуля? Шут — именно об этом. Ты стоишь на краю чего-то нового, и да, немного страшно. Но внутри тебя живёт ребёнок, который верит в чудеса. Доверься ему. Иногда лучший план — это отсутствие плана.", advice: "Рискни. Прыгни. Сетка появится." },
            { id: 1, name: "I. Маг", narrative: "взять инициативу в свои руки", element: "air", keywords: ["воля", "мастерство", "действие", "ресурсы"], image: "https://upload.wikimedia.org/wikipedia/en/d/de/RWS_Tarot_01_Magician.jpg", short: "Мастерство, сила воли", full: "У тебя есть всё, чтобы сотворить чудо. Маг говорит: 'Ты — творец своей реальности'. Все инструменты разложены перед тобой. Не жди знака свыше — ты сам и есть этот знак. Действуй уверенно, и мир прогнётся под тебя.", advice: "Действуй. Всё в твоих руках." },
            { id: 2, name: "II. Жрица", narrative: "довериться скрытой интуиции", element: "water", keywords: ["интуиция", "тайна", "пассивность", "знание"], image: "https://upload.wikimedia.org/wikipedia/en/8/88/RWS_Tarot_02_High_Priestess.jpg", short: "Интуиция, тайное знание", full: "Тсс... Слышишь? Это твой внутренний голос. Жрица просит выключить логику и послушать тишину. Ответы не во внешнем мире, они уже внутри тебя. Доверься своим снам и предчувствиям. Они не врут.", advice: "Слушай интуицию, а не логику." },
            { id: 3, name: "III. Императрица", narrative: "раскрыть творческий потенциал", element: "earth", keywords: ["изобилие", "творчество", "рост", "плодородие"], image: "https://upload.wikimedia.org/wikipedia/en/d/d2/RWS_Tarot_03_Empress.jpg", short: "Изобилие, творчество", full: "Жизнь бьёт ключом! Это время расцвета, красоты и удовольствий. Императрица — это мама-природа, которая говорит: 'Расслабься и позволь себе творить'. Рождай идеи, проекты или просто уют вокруг себя.", advice: "Твори и наслаждайся жизнью." },
            { id: 4, name: "IV. Император", narrative: "навести порядок и взять контроль", element: "fire", keywords: ["власть", "структура", "порядок", "контроль"], image: "https://upload.wikimedia.org/wikipedia/en/c/c3/RWS_Tarot_04_Emperor.jpg", short: "Власть, структура", full: "Пора навести порядок. Хватит хаоса! Император требует дисциплины и чёткого плана. Ты сейчас босс, и ответственность на тебе. Строй фундамент, устанавливай правила и защищай свою территорию.", advice: "Возьми ответственность на себя." },
            { id: 5, name: "V. Иерофант", narrative: "следовать проверенным традициям", element: "earth", keywords: ["традиция", "обучение", "мораль", "наставник"], image: "https://upload.wikimedia.org/wikipedia/en/8/8d/RWS_Tarot_05_Hierophant.jpg", short: "Традиции, обучение", full: "Иногда нужно следовать правилам. Иерофант — это мудрый учитель или наставник. Он говорит, что сейчас не время для бунта. Учись, следуй традициям или ищи совета у того, кто знает больше.", advice: "Следуй правилам и учись." },
            { id: 6, name: "VI. Влюбленные", narrative: "сделать выбор сердцем", element: "air", keywords: ["выбор", "любовь", "союз", "гармония"], image: "https://upload.wikimedia.org/wikipedia/en/d/db/RWS_Tarot_06_Lovers.jpg", short: "Любовь, важный выбор", full: "Это не только про романтику. Это про ВЫБОР. Выбор сердцем. Ты стоишь на развилке: пойти за разумом или за чувствами? Влюблённые советуют выбрать то, что заставляет твоё сердце петь. Объединяйся с другими.", advice: "Выбирай сердцем." },
            { id: 7, name: "VII. Колесница", narrative: "двигаться к цели несмотря ни на что", element: "water", keywords: ["победа", "движение", "прорыв", "контроль"], image: "https://upload.wikimedia.org/wikipedia/en/9/9b/RWS_Tarot_07_Chariot.jpg", short: "Победа, движение вперёд", full: "Газ в пол! Никаких сомнений. Ты взял поводья в свои руки, и теперь только вперёд. Препятствия будут, но ты проедешь по ним танком. Главное — держи фокус на цели и не отвлекайся.", advice: "Двигайся к цели, не останавливайся." },
            { id: 8, name: "VIII. Сила", narrative: "проявить мягкую, но твердую силу", element: "fire", keywords: ["сила", "терпение", "смелость", "страсть"], image: "https://upload.wikimedia.org/wikipedia/en/f/f5/RWS_Tarot_08_Strength.jpg", short: "Внутренняя сила, терпение", full: "Настоящая сила не в мускулах, а в мягкости. Ты можешь укротить своего внутреннего льва не кнутом, а любовью. Сейчас тебе нужно терпение и уверенность в себе. Ты сильнее, чем думаешь. Справься со зверем внутри.", advice: "Будь мягче, но увереннее." },
            { id: 9, name: "IX. Отшельник", narrative: "уйти в себя для поиска ответов", element: "earth", keywords: ["поиск", "одиночество", "мудрость", "анализ"], image: "https://upload.wikimedia.org/wikipedia/en/4/4d/RWS_Tarot_09_Hermit.jpg", short: "Поиск себя, мудрость", full: "Выключи телефон. Закрой дверь. Тебе нужно побыть одному. Ответы, которые ты ищешь, не в гугле, а в твоей голове. Отшельник — это пауза, чтобы найти свой свет во тьме. Не бойся одиночества, бойся шума.", advice: "Найди время для тишины." },
            { id: 10, name: "X. Колесо Фортуны", narrative: "довериться циклу перемен", element: "fire", keywords: ["удача", "перемены", "судьба", "цикл"], image: "https://upload.wikimedia.org/wikipedia/en/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg", short: "Удача, перемены", full: "Всё меняется! Сегодня ты наверху, завтра... кто знает? Но сейчас Колесо крутится в твою пользу. Лови момент! Это судьба вмешивается в твои планы. Доверься потоку, сопротивляться бесполезно.", advice: "Доверься переменам. Всё к лучшему." },
            { id: 11, name: "XI. Справедливость", narrative: "взвесить всё и принять честное решение", element: "air", keywords: ["правда", "закон", "баланс", "решение"], image: "https://upload.wikimedia.org/wikipedia/en/e/e0/RWS_Tarot_11_Justice.jpg", short: "Честность, ответственность", full: "Что посеешь, то и пожнёшь. Всё просто. Справедливость требует честности — перед собой и другими. Если ты был прав, ты победишь. Если нет — прими урок. Сейчас нужен холодный ум и факты.", advice: "Будь честен и объективен." },
            { id: 12, name: "XII. Повешенный", narrative: "посмотреть на вещи под другим углом", element: "water", keywords: ["жертва", "пауза", "новый взгляд", "ожидание"], image: "https://upload.wikimedia.org/wikipedia/en/2/2b/RWS_Tarot_12_Hanged_Man.jpg", short: "Взгляни иначе", full: "Застрял? Бьёшься головой об стену? Повешенный советует: переверни картинку. Буквально посмотри на ситуацию вверх ногами. Иногда нужно отпустить контроль и просто подождать. Пазл сложится сам.", advice: "Отпусти. Позволь жизни течь." },
            { id: 13, name: "XIII. Смерть", narrative: "отпустить старое ради нового", element: "water", keywords: ["конец", "трансформация", "переход", "обновление"], image: "https://upload.wikimedia.org/wikipedia/en/d/d7/RWS_Tarot_13_Death.jpg", short: "Конец и начало", full: "Не пугайся! Это не про физическую смерть. Это про то, что что-то в твоей жизни отжило своё. Отношения, работа, старые привычки — что-то должно уйти, чтобы пришло новое. Отпусти то, что держит тебя.", advice: "Попрощайся с прошлым. Будущее ждёт." },
            { id: 14, name: "XIV. Умеренность", narrative: "найти гармонию и золотую середину", element: "fire", keywords: ["баланс", "исцеление", "терпение", "синтез"], image: "https://upload.wikimedia.org/wikipedia/en/f/f8/RWS_Tarot_14_Temperance.jpg", short: "Баланс — это искусство", full: "Слишком много работы? Слишком много отдыха? Умеренность напоминает: крайности разрушают. Найди золотую середину. Смешай воду и вино в правильных пространствах. Гармония — твой главный друг сейчас.", advice: "Не впадай в крайности. Найди баланс." },

            { id: 16, name: "XVI. Башня", narrative: "пережить резкое очищение", element: "fire", keywords: ["крах", "разрушение", "шок", "освобождение"], image: "https://upload.wikimedia.org/wikipedia/en/5/53/RWS_Tarot_16_Tower.jpg", short: "Гроза очищает", full: "Больно? Да. Страшно? Ещё бы. Но Башня рушится, чтобы ты увидел правду, которую не хотел замечать. После грозы воздух чище, после слёз легче. Это не конец — это жёсткий перезапуск.", advice: "Не держись за то, что падает. Строй новое." },
            { id: 17, name: "XVII. Звезда", narrative: "обрести надежду и вдохновение", element: "air", keywords: ["надежда", "вдохновение", "исцеление", "вера"], image: "https://upload.wikimedia.org/wikipedia/en/d/db/RWS_Tarot_17_Star.jpg", short: "Надежда светит", full: "После самой тёмной ночи всегда выходят звёзды. Ты прошёл через многое, и теперь Вселенная посылает тебе знак: всё будет хорошо. Верь в свою мечту. Она ближе, чем кажется.", advice: "Не теряй надежду. Ты на правильном пути." },
            { id: 18, name: "XVIII. Луна", narrative: "пройти сквозь туман иллюзий", element: "water", keywords: ["иллюзия", "страх", "подсознание", "сны"], image: "https://upload.wikimedia.org/wikipedia/en/7/7f/RWS_Tarot_18_Moon.jpg", short: "Не всё так, как кажется", full: "В лунном свете всё выглядит иначе. Страхи кажутся больше, а люди — загадочнее. Луна предупреждает: не доверяй первому впечатлению. Проверяй факты. Жди рассвета, прежде чем принимать решения.", advice: "Будь осторожен(на) с иллюзиями." },
            { id: 19, name: "XIX. Солнце", narrative: "насладиться ясностью и успехом", element: "fire", keywords: ["радость", "успех", "энергия", "ясность"], image: "https://upload.wikimedia.org/wikipedia/en/1/17/RWS_Tarot_19_Sun.jpg", short: "Радость и победа!", full: "Это лучшая карта в колоде! Солнце сияет, ребёнок смеётся, всё получается. Успех, признание, чистая радость — всё это твоё прямо сейчас. Наслаждайся! Ты это заслужил(а).", advice: "Сияй! Разреши себе быть счастливым." },

            if (deck.classList.contains('processing')) return;
            deck.classList.add('processing');

            const cardBack = deck.querySelector('.card-back');

            // Delay before flip starts
            setTimeout(() => {
                cardBack.classList.add('card-shaking');
            }, 300);

            // Wait for flip to complete, then show result with fade
            setTimeout(() => {
                cardBack.classList.remove('card-shaking');
                deck.classList.remove('processing');

                const srcDeck = state.isPremium ? FULL_DECK : MAJOR_ARCANA;
                const spreadMeta = SPREAD_INFO[state.selectedSpread];
                const count = spreadMeta.count;

                const shuffled = [...srcDeck].sort(() => 0.5 - Math.random());
                const resultCards = shuffled.slice(0, count);

                const today = new Date().toISOString().split('T')[0];
                localStorage.setItem(KEYS.LAST_DRAW, JSON.stringify({
                    date: today,
                    spreadType: state.selectedSpread,
                    cards: resultCards
                }));

                wrapper.dataset.cardIndex = index;
                wrapper._cardEl = el;
                wrapper._infoEl = info;
                wrapper._wrapperEl = wrapper;
            });

            if (animate && cardsToShow.length > 0) {

                const premiumBlock = document.createElement('div');
                premiumBlock.className = 'premium-block';
                premiumBlock.style.cssText = 'background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 15px; width: 100%; margin-bottom: 20px; position: relative; overflow: hidden; border: 1px solid rgba(255, 215, 0, 0.2);';

                // Get the first card for preview
                const previewCard = cards[0];

                premiumBlock.innerHTML = `
                    <h3 style="color:var(--accent-gold); margin:0 0 10px 0; font-family:'Cinzel',serif;">Глубинный смысл</h3>

                    <div class="unlock-overlay">
                        <button class="btn btn-gold" onclick="watchAd()">
                            <i class="fa-solid fa-play"></i> Открыть за рекламу
                        </button>
                        <p style="font-size: 0.8rem; margin-top: 10px; opacity: 0.8;">Просмотр видео (3 сек)</p>
                    </div>

                    <div class="premium-content blurred">
                        <p style="color:#e0e0e0; font-size:0.9rem; line-height:1.6; margin:0;">${previewCard.full}</p>
                        <div class="advice-box">
                            <span class="advice-label">Совет карт:</span>
                            <span style="color:#ccc;">${previewCard.advice}</span>
                        </div>
                    </div>
                `;
                actionsDiv.appendChild(premiumBlock);

            } else {
                // Full Result Logic
                const shareBtn = document.createElement('button');
                shareBtn.className = 'btn btn-share';
                shareBtn.innerHTML = '<i class="fa-brands fa-telegram"></i> Поделиться предсказанием';
                shareBtn.onclick = sharePrediction;
                actionsDiv.appendChild(shareBtn);

                const resetBtn = document.createElement('button');
                resetBtn.className = 'btn btn-share';
                resetBtn.style.border = 'none';
                resetBtn.style.background = 'transparent';
                resetBtn.style.opacity = '0.5';
                resetBtn.textContent = 'Сброс (Новый день)';
                resetBtn.onclick = resetApp;
                actionsDiv.appendChild(resetBtn);

                // Premium Upsell / Cross Link
                const upsellDiv = document.createElement('div');
                upsellDiv.className = 'premium-block';
                upsellDiv.style.marginTop = '20px';
                upsellDiv.style.border = '1px solid var(--accent-gold)';
                upsellDiv.style.padding = '20px';
                upsellDiv.style.borderRadius = '12px';
                upsellDiv.style.background = 'rgba(255, 215, 0, 0.05)';
                upsellDiv.style.textAlign = 'center';

                if (!state.isPremium) {
                    // Free User -> Upsell
                    upsellDiv.innerHTML = `
                        <h3 style="color:var(--accent-gold); margin:0 0 10px 0;"><i class="fa-solid fa-crown"></i> INTARIUS Premium</h3>
                        <p style="font-size:0.9rem; color:#ccc; margin-bottom:15px;">
                            Хочешь узнать больше? Оформи Premium и открой расклад <strong>"Кельтский Крест"</strong> (10 карт) с полным анализом.
                        </p>
                        <button class="btn" style="width:100%; justify-content:center;" onclick="tg.showPopup({title:'Premium', message:'Покупка в разработке'})">
                            Оформить Premium
                        </button>
                    `;
                    actionsDiv.appendChild(upsellDiv);
                } else if (spreadType !== 'cross') {
                    // Premium User -> Link to Cross
                    upsellDiv.innerHTML = `
                        <h3 style="color:var(--accent-gold); margin:0 0 10px 0;"><i class="fa-solid fa-crown"></i> INTARIUS Premium</h3>
                        <p style="font-size:0.9rem; color:#ccc; margin-bottom:15px;">
                            Ваш статус позволяет использовать полный расклад <strong>"Кельтский Крест"</strong>.
                        </p>
                        <button class="btn" style="width:100%; justify-content:center;" onclick="startCrossReading()">
                            Открыть Кельтский Крест (10 карт)
                        </button>
                    `;
                    actionsDiv.appendChild(upsellDiv);
                }
            }

            container.appendChild(actionsDiv);
            document.getElementById('result-title').textContent = spreadMeta.name;
            showScreen('result-screen');
        }

        function watchAd() {
            // Adsgram Integration - Following official documentation pattern
            // https://docs.adsgram.ai/publisher/reward-interstitial-code-examples

            const unlockContent = () => {
                state.adWatched = true;
                localStorage.setItem(KEYS.AD_WATCHED, 'true');
                const lastDraw = JSON.parse(localStorage.getItem(KEYS.LAST_DRAW));
                if (lastDraw) showResult(lastDraw.cards, state.selectedSpread, true);
            };

            if (!window.Adsgram) {
                console.warn("Adsgram SDK not loaded - fallback unlock");
                unlockContent();
                return;
            }

            // Initialize AdController (only needs to be done once per blockId)
            const AdController = window.Adsgram.init({ blockId: "int-22202" });

            // Show ad - .then() = watched to end, .catch() = skipped or error
            AdController.show()
                .then((result) => {
                    // User watched ad till the end
                    console.log("Ad watched successfully:", result);
                    tg.showPopup({ title: 'Судьба открыта', message: 'Вселенная благодарит вас за терпение.' });
                    unlockContent();
                })
                .catch((result) => {
                    // User skipped ad or error occurred
                    console.log("Ad skipped or error:", result);
                    if (result.error) {
                        // Error - unlock as fallback
                        unlockContent();
                    } else {
                        // User skipped - don't unlock, show warning
                        tg.showPopup({ title: 'Внимание', message: 'Чтобы узнать судьбу, нужно досмотреть видео до конца.' });
                    }
                });
        }

        function sharePrediction() {
            const url = "https://t.me/Intarius_bot";

            // Convert HTML to Telegram markdown
            function htmlToTelegramMarkdown(html) {
                if (!html) return "Карты открыли мне многое.";

                let text = html
                    // Convert <strong> and <b> to **bold**
                    .replace(/<strong[^>]*>(.*?)<\/strong>/gi, '*$1*')
                    .replace(/<b[^>]*>(.*?)<\/b>/gi, '*$1*')
                    // Convert <em> and <i> to _italic_
                    .replace(/<em[^>]*>(.*?)<\/em>/gi, '_$1_')
                    .replace(/<i[^>]*>(.*?)<\/i>/gi, '_$1_')
                    // Convert <br> to newline
                    .replace(/<br\s*\/?>/gi, '\n')
                    // Convert block elements to newlines
                    .replace(/<\/(p|div|h[1-6])>/gi, '\n')
                    // Remove remaining HTML tags
                    .replace(/<[^>]+>/g, '')
                    // Clean up excessive newlines
                    .replace(/\n{3,}/g, '\n\n')
                    // Decode HTML entities
                    .replace(/&nbsp;/g, ' ')
                    .replace(/&amp;/g, '&')
                    .replace(/&lt;/g, '<')
                    .replace(/&gt;/g, '>')
                    .replace(/&quot;/g, '"')
                    .trim();

                return text;
            }

            // Build coherent share message with formatting
            let shareBody = htmlToTelegramMarkdown(state.lastSynthesisHTML);

            // Truncate if too long (Telegram limit ~4096, but URL params are shorter ~2000 safe)
            if (shareBody.length > 500) {
                shareBody = shareBody.substring(0, 497) + "...";
            }

            const text = `🔮 *INTARIUS: Моё предсказание*\n\n${shareBody}\n\n✨ Попробуй и ты!`;
            const fullUrl = `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
            tg.openTelegramLink ? tg.openTelegramLink(fullUrl) : window.open(fullUrl, '_blank');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function resetApp() {
            localStorage.clear();
            location.reload();
        }

        // Particles
        const pContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.width = Math.random() * 3 + 'px';
            s.style.height = s.style.width;
            s.style.animationDelay = Math.random() * 5 + 's';
            pContainer.appendChild(s);
        }
    </script>
</body>
